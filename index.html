
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YTTP HR Assistent</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --off-white: #F3F2EE;
    --hellgrau: #DBDBDB;
    --taupe: #827B6D;
    --anthrazit: #1C1C1C;
    --sage: #9CA095;
    --orange: #D7662F;
    --font: 'Inter', Arial, sans-serif;
  }

  html, body {
    height: 100%;
    background: var(--off-white);
    color: var(--anthrazit);
    font-family: var(--font);
    font-size: 14px;
    line-height: 1.5;
  }

  /* Layout */
  .app {
    display: grid;
    grid-template-rows: 56px 1fr 80px;
    height: 100vh;
    max-width: 860px;
    margin: 0 auto;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 32px;
    border-bottom: 1px solid var(--hellgrau);
    background: var(--off-white);
  }

  .logo {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--anthrazit);
  }

  .logo span {
    color: var(--taupe);
    font-weight: 400;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--hellgrau);
    transition: background 0.3s;
  }
  .status-dot.active { background: #6ab04c; }
  .status-dot.loading { background: var(--orange); }

  /* Chat area */
  .messages {
    overflow-y: auto;
    padding: 32px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .message {
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-width: 680px;
  }

  .message.user { align-self: flex-end; align-items: flex-end; }
  .message.assistant { align-self: flex-start; align-items: flex-start; }

  .message-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--taupe);
  }

  .message-bubble {
    padding: 14px 18px;
    border-radius: 2px;
    font-size: 13.5px;
    line-height: 1.6;
    white-space: pre-wrap;
  }

  .message.user .message-bubble {
    background: var(--anthrazit);
    color: var(--off-white);
  }

  .message.assistant .message-bubble {
    background: white;
    border: 1px solid var(--hellgrau);
    color: var(--anthrazit);
  }

  /* Loading */
  .loading-bubble {
    padding: 14px 18px;
    background: white;
    border: 1px solid var(--hellgrau);
    border-radius: 2px;
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--taupe);
    animation: pulse 1.2s ease-in-out infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes pulse {
    0%, 100% { opacity: 0.3; transform: scale(0.9); }
    50% { opacity: 1; transform: scale(1.1); }
  }

  /* Suggestions */
  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 8px;
  }

  .suggestion {
    font-size: 12px;
    padding: 6px 12px;
    border: 1px solid var(--hellgrau);
    background: white;
    color: var(--taupe);
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
    font-family: var(--font);
  }

  .suggestion:hover {
    border-color: var(--taupe);
    color: var(--anthrazit);
  }

  /* Input */
  .input-area {
    border-top: 1px solid var(--hellgrau);
    padding: 16px 32px;
    display: flex;
    gap: 12px;
    align-items: flex-end;
    background: var(--off-white);
  }

  textarea {
    flex: 1;
    resize: none;
    border: 1px solid var(--hellgrau);
    background: white;
    padding: 12px 14px;
    font-family: var(--font);
    font-size: 13.5px;
    color: var(--anthrazit);
    border-radius: 2px;
    outline: none;
    line-height: 1.5;
    max-height: 120px;
    transition: border-color 0.15s;
  }

  textarea:focus { border-color: var(--taupe); }
  textarea::placeholder { color: var(--hellgrau); }

  button.send {
    width: 40px;
    height: 40px;
    border: none;
    background: var(--anthrazit);
    color: var(--off-white);
    cursor: pointer;
    border-radius: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s;
  }

  button.send:hover { background: var(--taupe); }
  button.send:disabled { background: var(--hellgrau); cursor: not-allowed; }

  /* Config modal */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(28,28,28,0.5);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
  }

  .modal {
    background: var(--off-white);
    border: 1px solid var(--hellgrau);
    padding: 40px;
    width: 480px;
    border-radius: 2px;
  }

  .modal h2 {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 8px;
    color: var(--anthrazit);
  }

  .modal p {
    font-size: 12.5px;
    color: var(--taupe);
    margin-bottom: 24px;
    line-height: 1.6;
  }

  .field { margin-bottom: 16px; }

  .field label {
    display: block;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--taupe);
    margin-bottom: 6px;
  }

  .field input {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--hellgrau);
    background: white;
    font-family: var(--font);
    font-size: 13px;
    color: var(--anthrazit);
    border-radius: 2px;
    outline: none;
  }

  .field input:focus { border-color: var(--taupe); }

  button.primary {
    width: 100%;
    padding: 12px;
    background: var(--anthrazit);
    color: var(--off-white);
    border: none;
    font-family: var(--font);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    margin-top: 8px;
    transition: background 0.15s;
  }

  button.primary:hover { background: var(--taupe); }

  /* Empty state */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 16px;
    color: var(--taupe);
  }

  .empty-state .yttp-mark {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--hellgrau);
  }

  .empty-state h1 {
    font-size: 18px;
    font-weight: 500;
    color: var(--anthrazit);
    text-align: center;
  }

  .empty-state p {
    font-size: 13px;
    color: var(--taupe);
    text-align: center;
    max-width: 360px;
    line-height: 1.6;
  }

  .quick-questions {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 8px;
    width: 100%;
    max-width: 420px;
  }

  .quick-question {
    padding: 12px 16px;
    border: 1px solid var(--hellgrau);
    background: white;
    color: var(--anthrazit);
    font-size: 13px;
    cursor: pointer;
    border-radius: 2px;
    text-align: left;
    font-family: var(--font);
    transition: all 0.15s;
  }

  .quick-question:hover {
    border-color: var(--taupe);
    background: var(--off-white);
  }

  .divider {
    width: 1px;
    height: 24px;
    background: var(--hellgrau);
  }
</style>
</head>
<body>

<div id="modal-overlay" class="modal-overlay">
  <div class="modal">
    <h2>Konfiguration</h2>
    <p>Trag deinen Anthropic API Key und die Make Webhook-URL ein. Diese werden nur lokal in deinem Browser gespeichert.</p>
    <div class="field">
      <label>Anthropic API Key</label>
      <input type="password" id="api-key-input" placeholder="sk-ant-api03-..." />
    </div>
    <div class="field">
      <label>Make Webhook URL</label>
      <input type="text" id="webhook-input" placeholder="https://hook.eu2.make.com/..." />
    </div>
    <button class="primary" onclick="saveConfig()">Speichern und starten</button>
  </div>
</div>

<div class="app">
  <header>
    <div class="logo">YTTP <span>HR Assistent</span></div>
    <div id="status-dot" class="status-dot"></div>
  </header>

  <div class="messages" id="messages">
    <div class="empty-state" id="empty-state">
      <div class="yttp-mark">YTTP</div>
      <h1>HR Assistent</h1>
      <p>Stelle Fragen zu Mitarbeitern und Abwesenheiten über alle Standorte — Köln, Berlin und Hamburg.</p>
      <div class="quick-questions">
        <button class="quick-question" onclick="askQuestion('Wie viele Mitarbeiter haben wir insgesamt?')">Wie viele Mitarbeiter haben wir insgesamt?</button>
        <button class="quick-question" onclick="askQuestion('Welche Mitarbeiter sind in Berlin?')">Welche Mitarbeiter sind in Berlin?</button>
        <button class="quick-question" onclick="askQuestion('Wer ist aktuell im Urlaub in Köln?')">Wer ist aktuell im Urlaub in Köln?</button>
        <button class="quick-question" onclick="askQuestion('Welche Abwesenheiten gibt es im Juli in Hamburg?')">Welche Abwesenheiten gibt es im Juli in Hamburg?</button>
      </div>
    </div>
  </div>

  <div class="input-area">
    <textarea
      id="input"
      rows="1"
      placeholder="Frage stellen..."
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"
    ></textarea>
    <button class="send" id="send-btn" onclick="sendMessage()" title="Senden">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24">
        <path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>
</div>

<script>
  // Config
  let ANTHROPIC_KEY = '';
  let WEBHOOK_URL = '';

  // Company IDs
  const COMPANIES = {
    'köln': '6900',
    'koeln': '6900',
    'berlin': '7460',
    'hamburg': '9343',
    'alle': 'all'
  };

  // Conversation history
  let history = [];
  let isLoading = false;

  // System prompt
  const SYSTEM_PROMPT = `Du bist der HR-Assistent von YTTP, einem Anbieter für Reformer Pilates und Fitness mit Studios in Köln, Berlin und Hamburg.

Du hast Zugriff auf Personaldaten aus Ordio über drei Werkzeuge:
1. get_employees(company_id) — Mitarbeiterstammdaten für einen Standort
2. get_absences(company_id) — Abwesenheiten für einen Standort
3. get_all_employees() — Mitarbeiter aller drei Standorte zusammen

Company IDs: Köln=6900, Berlin=7460, Hamburg=9343

Wenn du Daten abrufen möchtest, antworte AUSSCHLIESSLICH mit einem JSON-Objekt in folgendem Format (kein anderer Text):
{"tool": "get_employees", "company_id": "6900"}
oder
{"tool": "get_absences", "company_id": "7460"}
oder
{"tool": "get_all", "endpoints": [{"company_id": "6900", "endpoint": "employees/minimal"}, {"company_id": "7460", "endpoint": "employees/minimal"}, {"company_id": "9343", "endpoint": "employees/minimal"}]}

Nachdem du die Daten erhalten hast, beantworte die Frage präzise auf Deutsch. Keine Floskeln.`;

  function saveConfig() {
    const key = document.getElementById('api-key-input').value.trim();
    const webhook = document.getElementById('webhook-input').value.trim();
    if (!key || !webhook) { alert('Bitte beide Felder ausfüllen.'); return; }
    ANTHROPIC_KEY = key;
    WEBHOOK_URL = webhook;
    localStorage.setItem('yttp_hr_key', key);
    localStorage.setItem('yttp_hr_webhook', webhook);
    document.getElementById('modal-overlay').style.display = 'none';
    document.getElementById('status-dot').classList.add('active');
  }

  // Load saved config
  window.onload = () => {
    const savedKey = localStorage.getItem('yttp_hr_key');
    const savedWebhook = localStorage.getItem('yttp_hr_webhook');
    if (savedKey && savedWebhook) {
      ANTHROPIC_KEY = savedKey;
      WEBHOOK_URL = savedWebhook;
      document.getElementById('api-key-input').value = savedKey;
      document.getElementById('webhook-input').value = savedWebhook;
      document.getElementById('modal-overlay').style.display = 'none';
      document.getElementById('status-dot').classList.add('active');
    }
  };

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function askQuestion(q) {
    document.getElementById('input').value = q;
    sendMessage();
  }

  function addMessage(role, text) {
    const empty = document.getElementById('empty-state');
    if (empty) empty.remove();

    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `message ${role}`;
    div.innerHTML = `
      <div class="message-label">${role === 'user' ? 'Du' : 'HR Assistent'}</div>
      <div class="message-bubble">${text}</div>
    `;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
    return div;
  }

  function showLoading() {
    const empty = document.getElementById('empty-state');
    if (empty) empty.remove();
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'message assistant';
    div.id = 'loading-msg';
    div.innerHTML = `
      <div class="message-label">HR Assistent</div>
      <div class="loading-bubble">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>
    `;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function hideLoading() {
    const l = document.getElementById('loading-msg');
    if (l) l.remove();
  }

  // Call webhook for one endpoint
  async function callWebhook(companyId, endpoint) {
    const url = `${WEBHOOK_URL}?company_id=${companyId}&endpoint=${encodeURIComponent(endpoint)}`;
    const res = await fetch(url);
    const text = await res.text();
    // Make returns "accepted" for async — we need to handle this
    if (text === 'accepted' || text === '"accepted"') {
      return `[Webhook empfangen für company_id=${companyId}, endpoint=${endpoint}]`;
    }
    return text;
  }

  // Process tool call from Claude
  async function processTool(toolCall) {
    try {
      const parsed = JSON.parse(toolCall);

      if (parsed.tool === 'get_employees') {
        return await callWebhook(parsed.company_id, 'employees/minimal');
      }
      if (parsed.tool === 'get_absences') {
        return await callWebhook(parsed.company_id, 'absences?start_tz=2026-01-01');
      }
      if (parsed.tool === 'get_all') {
        const results = await Promise.all(
          parsed.endpoints.map(e => callWebhook(e.company_id, e.endpoint))
        );
        return results.join('\n---\n');
      }
    } catch(e) {}
    return null;
  }

  async function callClaude(messages) {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': ANTHROPIC_KEY,
        'anthropic-version': '2023-06-01'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5',
        max_tokens: 2048,
        system: SYSTEM_PROMPT,
        messages: messages
      })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    return data.content[0].text;
  }

  async function sendMessage() {
    if (isLoading) return;
    const input = document.getElementById('input');
    const text = input.value.trim();
    if (!text) return;
    if (!ANTHROPIC_KEY) { alert('Bitte zuerst den API Key konfigurieren.'); return; }

    input.value = '';
    input.style.height = 'auto';
    isLoading = true;
    document.getElementById('send-btn').disabled = true;
    document.getElementById('status-dot').className = 'status-dot loading';

    addMessage('user', text);
    history.push({ role: 'user', content: text });
    showLoading();

    try {
      // First Claude call
      let response = await callClaude(history);

      // Check if Claude wants to call a tool
      const toolData = await processTool(response);

      if (toolData) {
        // Claude requested data — add to history and call again
        history.push({ role: 'assistant', content: response });
        history.push({ role: 'user', content: `Ordio-Daten:\n${toolData}\n\nBitte beantworte jetzt die ursprüngliche Frage basierend auf diesen Daten.` });
        response = await callClaude(history);
      }

      history.push({ role: 'assistant', content: response });
      hideLoading();
      addMessage('assistant', response);

    } catch(err) {
      hideLoading();
      addMessage('assistant', `Fehler: ${err.message}`);
    }

    isLoading = false;
    document.getElementById('send-btn').disabled = false;
    document.getElementById('status-dot').className = 'status-dot active';
  }
</script>
</body>
</html>
