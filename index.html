
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YTTP HR Assistent</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --off-white: #F3F2EE; --hellgrau: #DBDBDB; --taupe: #827B6D;
    --anthrazit: #1C1C1C; --orange: #D7662F; --font: 'Inter', Arial, sans-serif;
  }
  html, body { height: 100%; background: var(--off-white); color: var(--anthrazit); font-family: var(--font); font-size: 14px; line-height: 1.5; }
  .app { display: grid; grid-template-rows: 56px 1fr 80px; height: 100vh; max-width: 860px; margin: 0 auto; }
  header { display: flex; align-items: center; justify-content: space-between; padding: 0 32px; border-bottom: 1px solid var(--hellgrau); background: var(--off-white); }
  .logo { font-size: 13px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--anthrazit); }
  .logo span { color: var(--taupe); font-weight: 400; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .user-email { font-size: 11px; color: var(--taupe); letter-spacing: 0.05em; }
  .settings-btn { font-size: 11px; color: var(--taupe); background: none; border: none; cursor: pointer; font-family: var(--font); padding: 4px 8px; letter-spacing: 0.05em; }
  .settings-btn:hover { color: var(--anthrazit); }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--hellgrau); transition: background 0.3s; }
  .status-dot.active { background: #6ab04c; }
  .status-dot.loading { background: var(--orange); }
  .messages { overflow-y: auto; padding: 32px; display: flex; flex-direction: column; gap: 24px; }
  .message { display: flex; flex-direction: column; gap: 6px; max-width: 680px; }
  .message.user { align-self: flex-end; align-items: flex-end; }
  .message.assistant { align-self: flex-start; align-items: flex-start; }
  .message-label { font-size: 10px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--taupe); }
  .message-bubble { padding: 14px 18px; border-radius: 2px; font-size: 13.5px; line-height: 1.6; white-space: pre-wrap; }
  .message.user .message-bubble { background: var(--anthrazit); color: var(--off-white); }
  .message.assistant .message-bubble { background: white; border: 1px solid var(--hellgrau); color: var(--anthrazit); }
  .loading-bubble { padding: 14px 18px; background: white; border: 1px solid var(--hellgrau); border-radius: 2px; display: flex; gap: 6px; align-items: center; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--taupe); animation: pulse 1.2s ease-in-out infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse { 0%, 100% { opacity: 0.3; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1.1); } }
  .input-area { border-top: 1px solid var(--hellgrau); padding: 16px 32px; display: flex; gap: 12px; align-items: flex-end; background: var(--off-white); }
  textarea { flex: 1; resize: none; border: 1px solid var(--hellgrau); background: white; padding: 12px 14px; font-family: var(--font); font-size: 13.5px; color: var(--anthrazit); border-radius: 2px; outline: none; line-height: 1.5; max-height: 120px; transition: border-color 0.15s; }
  textarea:focus { border-color: var(--taupe); }
  textarea::placeholder { color: var(--hellgrau); }
  button.send { width: 40px; height: 40px; border: none; background: var(--anthrazit); color: var(--off-white); cursor: pointer; border-radius: 2px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.15s; }
  button.send:hover { background: var(--taupe); }
  button.send:disabled { background: var(--hellgrau); cursor: not-allowed; }
  .overlay { position: fixed; inset: 0; background: var(--off-white); display: flex; align-items: center; justify-content: center; z-index: 100; }
  .modal { background: white; border: 1px solid var(--hellgrau); padding: 48px; width: 400px; border-radius: 2px; }
  .modal-logo { font-size: 11px; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; color: var(--hellgrau); margin-bottom: 24px; }
  .modal h2 { font-size: 18px; font-weight: 500; color: var(--anthrazit); margin-bottom: 8px; }
  .modal p { font-size: 12.5px; color: var(--taupe); margin-bottom: 32px; line-height: 1.6; }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--taupe); margin-bottom: 6px; }
  .field input { width: 100%; padding: 11px 14px; border: 1px solid var(--hellgrau); background: var(--off-white); font-family: var(--font); font-size: 13px; color: var(--anthrazit); border-radius: 2px; outline: none; transition: border-color 0.15s; }
  .field input:focus { border-color: var(--taupe); background: white; }
  .error-msg { font-size: 12px; color: var(--orange); margin-top: 8px; display: none; }
  button.primary { width: 100%; padding: 13px; background: var(--anthrazit); color: var(--off-white); border: none; font-family: var(--font); font-size: 12px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; border-radius: 2px; margin-top: 8px; transition: background 0.15s; }
  button.primary:hover { background: var(--taupe); }
  button.primary:disabled { background: var(--hellgrau); cursor: not-allowed; }
  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 16px; }
  .empty-state .yttp-mark { font-size: 11px; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; color: var(--hellgrau); }
  .empty-state h1 { font-size: 18px; font-weight: 500; color: var(--anthrazit); text-align: center; }
  .empty-state p { font-size: 13px; color: var(--taupe); text-align: center; max-width: 360px; line-height: 1.6; }
  .quick-questions { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; width: 100%; max-width: 420px; }
  .quick-question { padding: 12px 16px; border: 1px solid var(--hellgrau); background: white; color: var(--anthrazit); font-size: 13px; cursor: pointer; border-radius: 2px; text-align: left; font-family: var(--font); transition: all 0.15s; }
  .quick-question:hover { border-color: var(--taupe); background: var(--off-white); }
</style>
</head>
<body>

<div id="login-overlay" class="overlay">
  <div class="modal">
    <div class="modal-logo">YTTP</div>
    <h2>HR Assistent</h2>
    <p>Interner Zugang. Bitte mit deiner YTTP-E-Mail anmelden.</p>
    <div class="field">
      <label>E-Mail</label>
      <input type="email" id="email-input" placeholder="vorname@yttp.de" autocomplete="email" />
    </div>
    <div class="field">
      <label>Passwort</label>
      <input type="password" id="pw-input" placeholder="Passwort" onkeydown="if(event.key==='Enter') login()" autocomplete="current-password" />
    </div>
    <div class="error-msg" id="pw-error">E-Mail oder Passwort falsch. Bitte erneut versuchen.</div>
    <button class="primary" id="login-btn" onclick="login()">Anmelden</button>
  </div>
</div>

<div class="app" id="app" style="display:none;">
  <header>
    <div class="logo">YTTP <span>HR Assistent</span></div>
    <div class="header-right">
      <span class="user-email" id="user-email"></span>
      <button class="settings-btn" onclick="logout()">Abmelden</button>
      <div id="status-dot" class="status-dot"></div>
    </div>
  </header>
  <div class="messages" id="messages">
    <div class="empty-state" id="empty-state">
      <div class="yttp-mark">YTTP</div>
      <h1>HR Assistent</h1>
      <p>Fragen zu Mitarbeitern, Abwesenheiten und Schichten — standortübergreifend für Köln, Berlin und Hamburg.</p>
      <div class="quick-questions">
        <button class="quick-question" onclick="askQuestion('Wie viele Mitarbeiter haben wir insgesamt?')">Wie viele Mitarbeiter haben wir insgesamt?</button>
        <button class="quick-question" onclick="askQuestion('Wer ist aktuell im Urlaub?')">Wer ist aktuell im Urlaub?</button>
        <button class="quick-question" onclick="askQuestion('Welcher Standort hatte diesen Monat die meisten Schichten?')">Welcher Standort hatte diesen Monat die meisten Schichten?</button>
        <button class="quick-question" onclick="askQuestion('Wann stehen die nächsten Mitarbeitergespräche an?')">Wann stehen die nächsten Mitarbeitergespräche an?</button>
      </div>
    </div>
  </div>
  <div class="input-area">
    <textarea id="input" rows="1" placeholder="Frage stellen..." onkeydown="handleKey(event)" oninput="autoResize(this)" maxlength="2000"></textarea>
    <button class="send" id="send-btn" onclick="sendMessage()">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://nlfhkmbrvxxkavxzaqik.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5sZmhrbWJydnh4a2F2eHphcWlrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MzM1NzksImV4cCI6MjA5NzEwOTU3OX0.mR-Fsj1lFZeZnujglm4pwJzFZWiDXGVgyuTUzwB5obg';
  const EDGE_URL = 'https://nlfhkmbrvxxkavxzaqik.supabase.co/functions/v1/hr-assistant';

  const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  let isLoading = false;

  window.onload = async () => {
    const { data: { session } } = await sbClient.auth.getSession();
    if (session) {
      startApp(session);
    } else {
      document.getElementById('email-input').focus();
    }
  };

  async function login() {
    const email = document.getElementById('email-input').value.trim();
    const pw = document.getElementById('pw-input').value;
    const btn = document.getElementById('login-btn');
    const err = document.getElementById('pw-error');
    err.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'Anmelden...';
    const { data, error } = await sbClient.auth.signInWithPassword({ email, password: pw });
    if (error || !data.session) {
      err.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Anmelden';
      document.getElementById('pw-input').value = '';
      document.getElementById('pw-input').focus();
      return;
    }
    startApp(data.session);
  }

  function startApp(session) {
    document.getElementById('login-overlay').style.display = 'none';
    document.getElementById('app').style.display = 'grid';
    document.getElementById('user-email').textContent = session.user.email;
    document.getElementById('status-dot').className = 'status-dot active';
  }

  async function logout() {
    await sbClient.auth.signOut();
    location.reload();
  }

  function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; }
  function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
  function askQuestion(q) { document.getElementById('input').value = q; sendMessage(); }

  function addMessage(role, text) {
    const empty = document.getElementById('empty-state');
    if (empty) empty.remove();
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `message ${role}`;
    const label = role === 'user' ? 'Du' : 'HR Assistent';
    const safe = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    div.innerHTML = `<div class="message-label">${label}</div><div class="message-bubble">${safe}</div>`;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function showLoading() {
    const empty = document.getElementById('empty-state');
    if (empty) empty.remove();
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'message assistant'; div.id = 'loading-msg';
    div.innerHTML = `<div class="message-label">HR Assistent</div><div class="loading-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function hideLoading() { const l = document.getElementById('loading-msg'); if (l) l.remove(); }

  async function sendMessage() {
    if (isLoading) return;
    const input = document.getElementById('input');
    const text = input.value.trim();
    if (!text) return;

    const { data: { session } } = await sbClient.auth.getSession();
    if (!session) { location.reload(); return; }

    input.value = ''; input.style.height = 'auto';
    isLoading = true;
    document.getElementById('send-btn').disabled = true;
    document.getElementById('status-dot').className = 'status-dot loading';
    addMessage('user', text);
    showLoading();

    try {
      const res = await fetch(EDGE_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + session.access_token
        },
        body: JSON.stringify({ question: text })
      });
      const data = await res.json();
      hideLoading();
      addMessage('assistant', data.answer || data.error || 'Keine Antwort erhalten.');
    } catch(err) {
      hideLoading();
      addMessage('assistant', 'Verbindungsfehler. Bitte versuche es erneut.');
    }

    isLoading = false;
    document.getElementById('send-btn').disabled = false;
    document.getElementById('status-dot').className = 'status-dot active';
  }
</script>
</body>
</html>
